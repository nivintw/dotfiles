# Main pipeline: on every push to main, run the SAME quality gate as PRs, then — only
# here — a release stage. This is the GitHub Actions analogue of a Jenkins
# `when { branch 'main' }` stage: a separate job (`release`) gated by `needs: ci`,
# so it runs only after the gate passes and only on main (this workflow's trigger).
#
# RELEASE FLOW (commitizen decides everything; the API just stamps its decision):
#   1. `cz bump --files-only` computes the next version from the conventional-commit
#      history (first release with no tags → forced MAJOR → v1.0.0) and writes it into
#      the version-of-record (pyproject.toml [project].version, per .cz.toml's
#      version_provider = uv) + uv.lock + CHANGELOG.md, WITHOUT committing or tagging.
#   2. The workflow creates a GitHub-SIGNED commit of those files via the GraphQL
#      createCommitOnBranch mutation, authenticated as the `nivintw-ci-app` GitHub
#      App → the commit is Verified and attributed to nivintw-ci-app[bot].
#   3. An annotated tag v<version> is created pointing at that commit.
#   4. A GitHub Release is cut, body = the changelog section cz generated.
# The bump skips cleanly when a push has nothing releasable (docs/chore-only).
#
# WHY THIS SHAPE (vs. a plain `cz bump` + git push):
#   - Auth: pushing to main must come from a ruleset BYPASS actor. The default
#     GITHUB_TOKEN can't bypass a ruleset (it isn't a selectable actor); the
#     `nivintw-ci-app` App is — it's in the `update-main` ruleset's bypass list.
#   - Signatures: the `protect-main` ruleset requires verified-signed commits and is
#     NEVER bypassed, so the bot's commit must be signed too. A locally-created
#     `git commit` can only be signed by a key on the runner (tied to a user, not an
#     App). createCommitOnBranch makes GitHub sign it server-side as the App — so no
#     signing key is stored anywhere.
#   - No loop: unlike GITHUB_TOKEN, an App token's push DOES re-trigger workflows, so
#     the bump commit headline carries "[skip ci]" — GitHub then skips that run.
#
# RACE SAFETY (overlapping merges): two merges in quick succession would otherwise
# start two release runs that both try to stamp a bump, and the second's
# createCommitOnBranch fails STALE_DATA (its expected head no longer matches main).
# Two things prevent that, and MUST stay together:
#   - `concurrency` serializes release runs (never cancel an in-flight one), so only
#     one stamps at a time.
#   - the release job operates on the LIVE main tip (checkout ref: main, expected head
#     read fresh from that checkout — NOT the triggering push SHA). So a queued run
#     sees the prior run's bump already on main, finds nothing to release, and exits
#     cleanly; a real commit that landed in between is swept into its release instead.
#
# REPO SETUP TO ENABLE RELEASES (the release job SKIPS cleanly until BOTH secrets
# exist — see the `preflight` job — so merging to main is always safe):
#   - The `nivintw-ci-app` GitHub App: Repository permissions → Contents: Read and
#     write; installed on this repo; in the `update-main` ruleset bypass list.
#   - Two repository secrets from that App:
#       CI_APP_ID           — the App's "App ID"
#       CI_APP_PRIVATE_KEY  — a generated private key (.pem contents)

name: main

on:
  push:
    branches: [main]
  # Manual trigger: run the release on demand from the Actions tab (or
  # `gh workflow run main.yml`). Needed because GitHub doesn't run a brand-new
  # push-triggered workflow on the very commit that introduces it, and handy for
  # re-running a release that failed partway.
  workflow_dispatch:

permissions:
  contents: read

# Serialize release runs so overlapping merges can't race the signed-bump stamping.
# cancel-in-progress: false — NEVER cancel a run that may be mid-stamp; let the next
# one queue and run after, against the (by then advanced) main tip. See RACE SAFETY.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Same gate as the PR pipeline — defined once, in the reusable ci.yml.
  ci:
    uses: ./.github/workflows/ci.yml

  # Guard: the release job needs the release App secrets. Secrets can't be read in a
  # job-level `if:`, so a step (which CAN see secrets) reports whether they're present,
  # and the release job gates on that output. BOTH secrets are required — gating on
  # CI_APP_ID alone would let a partial config (id set, key missing) flip enabled=true
  # and then fail the token mint, reddening every push to main. Until both are set,
  # release SKIPS cleanly (green run); add them and auto-release activates itself.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      release_enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          CI_APP_ID: ${{ secrets.CI_APP_ID }}
          CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$CI_APP_ID" ] && [ -n "$CI_APP_PRIVATE_KEY" ]; then
            echo "enabled=true" >>"$GITHUB_OUTPUT"
          else
            echo "enabled=false" >>"$GITHUB_OUTPUT"
            echo "::notice::Release skipped — release App secrets not set. Add CI_APP_ID and CI_APP_PRIVATE_KEY to enable auto-release."
          fi

  release:
    needs: [ci, preflight]
    if: needs.preflight.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Mint a token for the nivintw-ci-app App (the ruleset bypass actor)
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          # Scope the token to the minimum the release needs (signed bump commit, tag, ref,
          # release) instead of inheriting the App's blanket perms (zizmor github-app).
          permission-contents: write

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Check out the LIVE main tip, not the triggering push SHA: if a prior release
          # run already stamped a bump, this run must see it (and then find nothing to
          # release) rather than target a stale head. See RACE SAFETY.
          ref: main
          fetch-depth: 0 # full history + tags: the changelog and the no-tags (first-release) check
          token: ${{ steps.app-token.outputs.token }}
          # Bump/tag/release go through the API with this token, not `git push`, so the
          # token needn't be persisted to .git/config (zizmor artipacked).
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      - name: Install commitizen (+ gitmoji plugin)
        run: |
          uv tool install commitizen --with cz-conventional-gitmoji
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Compute the release (commitizen — files only, no commit/tag)
        id: bump
        run: |
          set -euo pipefail
          old="$(cz version --project)"
          # First release (no tags yet) cuts v1.0.0; after that the increment is
          # inferred from the conventional-commit types since the last tag.
          incr=()
          if [ -z "$(git tag)" ]; then incr=(--increment MAJOR); fi
          # --files-only writes pyproject + uv.lock + CHANGELOG.md but does NOT
          # commit/tag (the signed commit is made via the API below).
          # --changelog-to-stdout emits just the new section, for the Release body.
          # cz exits non-zero with nothing changed when there's nothing to release.
          # Scratch files go to $RUNNER_TEMP, OUTSIDE the work tree — otherwise
          # `git status` would list them and they'd be swept into changed_files.txt.
          if cz bump --yes --files-only --changelog-to-stdout "${incr[@]}" \
               >"$RUNNER_TEMP/release_notes.md" 2>"$RUNNER_TEMP/bump.log"; then
            new="$(cz version --project)"
            git status --porcelain | cut -c4- >"$RUNNER_TEMP/changed_files.txt"
            # The live main tip we're bumping ON TOP OF (HEAD hasn't moved — cz only
            # touched working-tree files). createCommitOnBranch stamps against this
            # exact oid, so a racing push is caught instead of silently overwritten.
            {
              echo "released=true"
              echo "old=$old"
              echo "new=$new"
              echo "tag=v$new"
              echo "head=$(git rev-parse HEAD)"
            } >>"$GITHUB_OUTPUT"
          elif [ -z "$(git status --porcelain)" ]; then
            echo "Nothing to release — no version-bumping commits since the last tag."
            echo "released=false" >>"$GITHUB_OUTPUT"
          else
            echo "cz bump failed:" >&2; cat "$RUNNER_TEMP/bump.log" >&2; exit 1
          fi

      - name: Create the signed bump commit + annotated tag as nivintw-ci-app
        if: steps.bump.outputs.released == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          OLD: ${{ steps.bump.outputs.old }}
          NEW: ${{ steps.bump.outputs.new }}
          TAG: ${{ steps.bump.outputs.tag }}
          HEAD_OID: ${{ steps.bump.outputs.head }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const { OLD, NEW, TAG, HEAD_OID } = process.env;
            // The files cz changed (pyproject.toml, uv.lock, CHANGELOG.md, …), listed
            // in the scratch file under $RUNNER_TEMP; paths are repo-relative.
            const paths = fs.readFileSync(`${process.env.RUNNER_TEMP}/changed_files.txt`, 'utf8').split('\n').filter(Boolean);
            const additions = paths.map((path) => ({
              path,
              contents: fs.readFileSync(path).toString('base64'),
            }));
            // createCommitOnBranch makes a GitHub-SIGNED commit (Verified), attributed
            // to the App, and fast-forwards main to it. expectedHeadOid is the live main
            // tip we bumped on top of (NOT context.sha, which can be stale behind a prior
            // release's bump) — it guards against a racing push. "[skip ci]" stops this
            // push from re-triggering the pipeline.
            const res = await github.graphql(
              `mutation($input: CreateCommitOnBranchInput!) {
                 createCommitOnBranch(input: $input) { commit { oid } }
               }`,
              {
                input: {
                  branch: { repositoryNameWithOwner: `${owner}/${repo}`, branchName: 'main' },
                  expectedHeadOid: HEAD_OID,
                  message: { headline: `🔖 bump: ${OLD} → ${NEW} [skip ci]` },
                  fileChanges: { additions },
                },
              },
            );
            const oid = res.createCommitOnBranch.commit.oid;
            core.info(`signed bump commit: ${oid}`);
            // Annotated tag → ref, pointing at the signed commit.
            const tag = await github.rest.git.createTag({
              owner, repo, tag: TAG, message: TAG, object: oid, type: 'commit',
            });
            await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${TAG}`, sha: tag.data.sha });
            core.info(`annotated tag ${TAG} → ${oid}`);

      - name: Publish the GitHub Release
        if: steps.bump.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Route the step output through env, not `${{ }}` in the script, so it can't be
          # interpreted as shell (zizmor template-injection).
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$RUNNER_TEMP/release_notes.md"
