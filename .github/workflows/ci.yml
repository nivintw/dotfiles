# CI — the shared lint/format/test gate. REUSABLE (on: workflow_call); the triggers
# live in the callers:
#   - pr.yml    (on: pull_request)  → this gate. The open-PR pipeline.
#   - main.yml  (on: push to main)  → this gate, THEN a release-please stage.
# Defining the gate once means both pipelines run the exact same checks.
#
# Most hooks self-bootstrap their pinned env (shellcheck, shfmt, actionlint, zizmor,
# typos, gitleaks, ruff, rumdl, validate-pyproject, uv-lock, the pre-commit-hooks
# builtins), so the only tools to install are the `language: system` ones CI actually
# needs: fish (the fish hooks), bats (the behavior tests), ripgrep (the fsearch
# behavior test, which gates on `rg`), and osv-scanner (the dependency-CVE hook — a
# release binary, like hawkeye/taplo). uv runs the `ty`/`uv audit` hooks + pytest. The
# pytest suite includes Playwright docs-site tests that drive a real browser, so a
# (cached) Chromium is installed just before that step.
#
# Third-party actions are pinned to a commit SHA (with the human-readable tag in a
# trailing comment) so a moved tag can't change what runs — Renovate bumps the SHA via
# the `# renovate:`-annotated pins. zizmor audits these workflows in the prek gate.
#
# SKIP=taplo,hawkeye-format: the prek hooks for these are `language: system` and expect
# the Brewfile binaries, which aren't on the ubuntu runner — so prek skips them and they
# run as their own steps below instead. Both fetch the pinned upstream binary (hawkeye and
# taplo each ship prebuilt releases) and match the local brew version, so CI and local
# check identically. We deliberately do NOT use korandoru/hawkeye's GitHub Action: it's a
# Docker action that rebuilds its image on every run (~3 min of pure overhead for a check
# that takes milliseconds) — the binary download is the same check in seconds. Both run in
# CHECK mode: CI verifies headers/formatting and fails on drift — it doesn't rewrite
# (hawkeye writes; `reuse` only verifies, so the two are complementary, not redundant).
#
# SKIP=no-commit-to-branch: a commit-time guard that blocks direct commits to main.
# CI runs `prek run --all-files` while checked out *on* main, so the guard would
# always fire here — it's meaningless outside the pre-commit moment. Skipping it is
# the CI analogue of the `SKIP=no-commit-to-branch` we use for intentional local
# commits to main.
#
# PORTING TO FORGEJO ACTIONS (self-hosted homelab, or Codeberg): copy this to
# .forgejo/workflows/ci.yml — the YAML is the same. Tweaks: Forgejo's default runner
# image is lean (Debian + Node), so install what you need or set a `container:`
# image; `permissions:` is ignored; `uses:` actions resolve from the runner's
# configured source. Structure and steps are otherwise identical.

name: ci

on:
  workflow_call:
    inputs:
      skip-quality-gate:
        description: >-
          When true, skip the heavy lint/format/test steps but still report success.
          main.yml sets this for release-please's bump commit (already validated as the
          Release PR), so a release doesn't re-run the full gate (doubled minutes). Callers'
          `needs: ci` is unaffected because the job still succeeds.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Read-only gate — don't leave the checkout token in .git/config (zizmor artipacked).
          persist-credentials: false

      - name: Set up uv (+ managed Python)
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      - name: Install system-hook tools
        if: inputs.skip-quality-gate != true
        run: sudo apt-get update && sudo apt-get install -y fish bats ripgrep

      - name: Cache prek hook environments
        if: inputs.skip-quality-gate != true
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/prek
          key: prek-${{ hashFiles('.pre-commit-config.yaml') }}
          # Fall back to any prior prek cache so a hook-rev bump rebuilds only the changed
          # env (not all of them) — matters more now there are more, oftener-bumped hooks.
          restore-keys: |
            prek-

      - name: Install osv-scanner (the dependency-CVE prek hook needs it on PATH)
        if: inputs.skip-quality-gate != true
        env:
          # renovate: datasource=github-releases depName=google/osv-scanner
          OSV_VERSION: "2.4.0"
          # SHA256 of osv-scanner_linux_amd64 (the published asset is the bare binary) —
          # refreshed with the version by scripts/refresh-binary-checksums.sh.
          OSV_SHA256: "15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0"  # gitleaks:allow
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 --retry-max-time 60 \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" \
            -o "$RUNNER_TEMP/osv-scanner"
          echo "${OSV_SHA256}  $RUNNER_TEMP/osv-scanner" | sha256sum -c -
          chmod +x "$RUNNER_TEMP/osv-scanner"
          echo "$RUNNER_TEMP" >>"$GITHUB_PATH"

      - name: Run prek hooks (same as local)
        if: inputs.skip-quality-gate != true
        env:
          # taplo/hawkeye run as dedicated steps below; no-commit-to-branch is a
          # commit-time guard meaningless in CI (we're checked out on the branch). zizmor
          # runs --offline in the hook (token-free local gate) and is SKIP'd here so CI
          # runs the FULL online audit as the dedicated step below instead.
          SKIP: taplo,hawkeye-format,no-commit-to-branch,zizmor
        run: uvx prek run --all-files

      - name: Audit workflows for security issues (zizmor, online)
        if: inputs.skip-quality-gate != true
        # The prek zizmor hook is --offline (deterministic, token-free) and SKIP'd above, so
        # CI runs the full audit here — the network audits (known-vulnerable-actions,
        # ref-confusion) need a GH token; the AST audits run as in the hook. Pinned to the
        # hook's zizmor version; contents:read suffices to query the advisory DB + resolve refs.
        env:
          GH_TOKEN: ${{ github.token }}
          # renovate: datasource=pypi depName=zizmor
          ZIZMOR_VERSION: "1.26.1"
        run: uvx "zizmor@${ZIZMOR_VERSION}" --no-progress .github/workflows/

      # taplo + hawkeye skip prek above (system binaries absent on the runner); run them
      # here instead so their checks are still enforced in CI.
      - name: Check SPDX license headers (hawkeye)
        if: inputs.skip-quality-gate != true
        env:
          # renovate: datasource=github-releases depName=korandoru/hawkeye
          HAWKEYE_VERSION: "6.5.1"
          # SHA256 of hawkeye-x86_64-unknown-linux-gnu.tar.xz — refreshed with the version
          # by scripts/refresh-binary-checksums.sh.
          HAWKEYE_SHA256: "d6eb0505a45a15244f4f789158aafe5e3f1a7dc86c9dc1d7651f3cb1e1b321e0"  # gitleaks:allow
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 --retry-max-time 60 \
            "https://github.com/korandoru/hawkeye/releases/download/v${HAWKEYE_VERSION}/hawkeye-x86_64-unknown-linux-gnu.tar.xz" \
            -o "$RUNNER_TEMP/hawkeye.tar.xz"
          echo "${HAWKEYE_SHA256}  $RUNNER_TEMP/hawkeye.tar.xz" | sha256sum -c -
          tar -xJ --strip-components=1 -C "$RUNNER_TEMP" -f "$RUNNER_TEMP/hawkeye.tar.xz" hawkeye-x86_64-unknown-linux-gnu/hawkeye
          chmod +x "$RUNNER_TEMP/hawkeye"
          "$RUNNER_TEMP/hawkeye" check --config .config/licenserc.toml

      - name: Check TOML formatting (taplo)
        if: inputs.skip-quality-gate != true
        env:
          # renovate: datasource=github-releases depName=tamasfe/taplo
          TAPLO_VERSION: "0.10.0"
          # SHA256 of taplo-linux-x86_64.gz. taplo ships no upstream checksum file, so this is
          # computed from the asset by scripts/refresh-binary-checksums.sh.
          TAPLO_SHA256: "8fe196b894ccf9072f98d4e1013a180306e17d244830b03986ee5e8eabeb6156"  # gitleaks:allow
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 --retry-max-time 60 \
            "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz" \
            -o "$RUNNER_TEMP/taplo.gz"
          echo "${TAPLO_SHA256}  $RUNNER_TEMP/taplo.gz" | sha256sum -c -
          gunzip -c "$RUNNER_TEMP/taplo.gz" >"$RUNNER_TEMP/taplo"
          chmod +x "$RUNNER_TEMP/taplo"
          "$RUNNER_TEMP/taplo" fmt --check --diff

      # The .claude/hooks bats tests invoke the lint hook, which calls `ruff` off
      # PATH — locally direnv's .envrc activates .venv to provide it, so do the same
      # here: materialize the project env and put its bin on PATH for this step.
      - name: Sync the project env (ruff/ty on PATH for the hook tests)
        if: inputs.skip-quality-gate != true
        run: uv sync
      - name: Fish behavior tests (bats)
        if: inputs.skip-quality-gate != true
        run: PATH="$PWD/.venv/bin:$PATH" bats tests/

      # Informational shell line-coverage for the bash scripts/ exercised by the bats suite
      # (kcov instruments bash, not fish). NOT a gate — continue-on-error keeps a kcov hiccup or
      # a coverage dip from failing CI. Deliberately soft for now: many of these scripts retire
      # with the installer→Python cutover (#72), so a hard shell threshold waits until the
      # surviving shell set is stable. The enforced gate is the Python --cov floor (the pytest
      # step below).
      - name: Shell coverage report (kcov, informational)
        if: inputs.skip-quality-gate != true
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends kcov
          PATH="$PWD/.venv/bin:$PATH" kcov --include-path="$PWD/scripts" \
            "$PWD/kcov-out" "$(command -v bats)" tests/
          python3 - <<'PY'
          import glob, json
          reports = glob.glob("kcov-out/*/coverage.json")
          if not reports:
              print("kcov: no coverage.json produced (skipping summary)")
              raise SystemExit(0)
          with open(reports[0], encoding="utf-8") as fh:
              data = json.load(fh)
          print(
              f"::notice title=Shell coverage (scripts/)::"
              f"{data.get('percent_covered', '?')}% "
              f"({data.get('covered_lines', '?')}/{data.get('total_lines', '?')} lines)"
          )
          PY

      # Key the browser cache on the Playwright version, NOT uv.lock: the bundled
      # Chromium build is pinned 1:1 to the Playwright release, while uv.lock churns
      # on every dependency change. Keying on uv.lock therefore busted this cache on
      # basically every such change, re-downloading Chromium each time. The version is
      # read from the synced env (uv sync ran above), so it reflects exactly what
      # pytest will drive.
      - name: Resolve Playwright version (stable cache key)
        if: inputs.skip-quality-gate != true
        id: pw
        run: echo "version=$(uv run playwright --version | awk '{print $2}')" >>"$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: inputs.skip-quality-gate != true
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      # `--only-shell chromium` fetches just the Chromium headless shell, not the full
      # browser: the docs-site tests run headless with no channel, which uses the shell
      # anyway (the heavier "new headless mode" is opt-in via channel "chromium"). The
      # `chromium` arg is required — a bare `--only-shell` means "all browsers" and also
      # pulls Firefox + WebKit. On a cache hit this skips the download; --with-deps
      # still runs apt for the system libs, which live in /usr/lib on the fresh runner
      # and so can't be cached.
      - name: Install Playwright headless shell (for the docs-site tests)
        if: inputs.skip-quality-gate != true
        run: uv run playwright install --with-deps --only-shell chromium

      - name: Config-validity + docs-site tests + installer-core coverage gate (pytest)
        if: inputs.skip-quality-gate != true
        run: uv run pytest --cov

  # End-to-end installer gate on a real macOS runner. The ubuntu lint-and-test job above can't
  # run install.sh (it's macOS-only) and the unit suite stubs every host mutation, so this is the
  # only CI check that actually RUNS the installer. It runs for real on the ephemeral runner (a
  # near-clean Mac); GitHub runners can't nest-virt, so Tart is the LOCAL pre-push gate and this
  # is the CI complement. Make `ci / installer-smoke-macos` a required status check — it's a
  # stable, always-reporting check thanks to the path gate below.
  installer-smoke-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          # Full history so the path gate can diff this PR/push against its base.
          fetch-depth: 0

      # Heavy install: run it ONLY when an installer-path file changed (and never for
      # release-please's bump commit). On every other PR the steps below no-op, so the job still
      # reports success — keeping it a stable REQUIRED check without burning macOS minutes.
      - name: Decide whether installer paths changed
        id: changed
        if: inputs.skip-quality-gate != true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          # release-please's version-bump commit only rewrites version/CHANGELOG/lock (no installer
          # logic) yet it touches pyproject.toml + uv.lock, which the path predicate below matches.
          # Skip it explicitly so a release doesn't burn macOS minutes on a pure bump. (On the push
          # to main, main.yml already sets skip-quality-gate; this also covers the Release PR's CI.)
          if git log -1 --format=%s | grep -q '^chore(main): release '; then
            echo "run=false" >>"$GITHUB_OUTPUT"
            echo "::notice title=installer-smoke-macos::release-please bump — skipping the macOS install."
            exit 0
          fi
          if [ -n "${BASE_SHA:-}" ]; then
            range="${BASE_SHA}...HEAD"                          # pull_request: whole PR vs its base
          elif [ -n "${BEFORE_SHA:-}" ] && ! printf '%s' "$BEFORE_SHA" | grep -qE '^0+$'; then
            range="${BEFORE_SHA}...HEAD"                        # push: the whole pushed commit range
          else
            range="HEAD~1...HEAD"                               # new branch/unknown base: tip commit
          fi
          if git diff --name-only "$range" \
            | grep -Eq '^(install\.sh|macos\.sh|dock\.sh|scripts/vm-smoke\.sh|src/dotfiles_install/|Brewfile($|\.d/)|pyproject\.toml|uv\.lock)'; then
            echo "run=true" >>"$GITHUB_OUTPUT"
          else
            echo "run=false" >>"$GITHUB_OUTPUT"
            echo "::notice title=installer-smoke-macos::No installer-path changes — skipping the macOS install."
          fi

      - name: Set up uv (+ managed Python)
        if: inputs.skip-quality-gate != true && steps.changed.outputs.run == 'true'
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      # The baseline --core install (CLI formulae only, no casks) end-to-end via the real shim.
      # Single pass: the local Tart hook does the ×2 idempotency run; macOS runner minutes are
      # ~10× ubuntu's, so CI proves "installs clean on a fresh Mac" and the local gate proves
      # re-runnable.
      - name: Run the installer (baseline, core profile)
        if: inputs.skip-quality-gate != true && steps.changed.outputs.run == 'true'
        run: ./install.sh --no-bundles --core

      - name: Verify the install (tolerating only the no-Touch-ID-sensor BAD)
        if: inputs.skip-quality-gate != true && steps.changed.outputs.run == 'true'
        run: |
          set -euo pipefail
          # vm-smoke.sh is sourceable (its main() only runs from the entrypoint guard), so reuse
          # its evaluate_stream gate — CI then tolerates exactly the one headless BAD (no Touch ID
          # sensor) the local harness does, and fails closed if the VERIFY_DONE sentinel is absent.
          # shellcheck source=scripts/vm-smoke.sh disable=SC1091
          source scripts/vm-smoke.sh
          uv run --no-dev --project "$PWD" dotfiles-install --core --verify-stream | evaluate_stream
