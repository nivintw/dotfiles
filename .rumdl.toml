# rumdl (markdown lint/format) config. See https://github.com/rvben/rumdl.

[global]
# Don't enforce a hard line length on prose.
disable = ["MD013"]
# Skip the .claude tree (those .md carry Claude Code frontmatter we don't want rumdl
# reformatting) and the generated changelog: release-please owns CHANGELOG.md and
# regenerates it with multiple consecutive blank lines (MD012) on every release PR.
exclude = ["LICENSE", "LICENSES/**", ".claude/", "**/CHANGELOG.md"]

[MD046]
# Always use fenced code blocks (```lang), never 4-space-indented.
style = "fenced"
