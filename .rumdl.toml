# rumdl (markdown lint/format) config for this repo. Also used by the rumdl
# VS Code extension. See https://github.com/rvben/rumdl.

[global]
# Don't enforce a hard line length on prose — the docs soft-wrap ~80 but tables,
# links, and the occasional sentence run over, and reflowing prose by hand is noise.
disable = ["MD013"]
# Skip the .claude tree: those .md carry Claude Code frontmatter we don't want rumdl
# reformatting. (LICENSE/LICENSES aren't markdown, so they're belt-and-suspenders.)
# Must live under [global] — a bare `exclude` after a rule table binds to that table,
# and rumdl ignores it as an unknown rule option.
exclude = ["LICENSE", "LICENSES/**", ".claude/"]

[MD046]
# Always use fenced code blocks (```lang), never 4-space-indented — keeps language
# hints and is easier to read. (rumdl's "consistent" default flipped a lone fenced
# block to indented.)
style = "fenced"
