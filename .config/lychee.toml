# lychee link-checker config. Excludes live here (not inline in link-check.yml) so a consuming
# repo can add its own host exclusions without editing the generated workflow — which would
# otherwise drift on the next `copier update`. The workflow passes only
# `--config .config/lychee.toml` (no inline `--exclude`); keeping ALL excludes in one source
# avoids lychee's CLI-vs-config merge ambiguity. See https://lychee.cli.rs.
exclude = [
  # release-please's generated CHANGELOG links to compare/<prev>...<next>, but the <next> tag
  # isn't cut until the Release PR merges, so it 404s on every Release PR until then (self-heals).
  "github\\.com/nivintw/dotfiles/compare/",
  # The REUSE badge's /info/ endpoint 404s until this repo is registered/crawled by
  # reuse.software (the /badge/ SVG still renders); self-heals once registered.
  "api\\.reuse\\.software/info/",
  # gnu.org blackholes GitHub's runner IPs — the README's GNU Stow link TIMEOUTs even at
  # --timeout 30 + 5 retries (a hard block, not slowness). Stable canonical URL, safe to skip.
  "gnu\\.org",
  # readthedocs.io rate-limits GitHub's runner IPs (HTTP 429 even after 5 retries). The docs
  # pages (ansible-dev-tools, copier, …) are stable canonical URLs the stack page links; skip
  # the CI check rather than let a transient rate-limit fail the build. Runs the same whack-a-mole
  # per-host otherwise, since several stack tools live on readthedocs.
  "readthedocs\\.io",
  # Documentation universals — safe to exclude in any project's docs.
  # Loopback / local-dev hosts that never resolve in CI.
  "^https?://(localhost|127\\.0\\.0\\.1)([:/]|$)",
  # RFC 2606 reserved example domains — placeholders, never real links.
  "^https?://([^/@]+\\.)?example\\.(com|org|net)([:/]|$)",
  # A not-yet-published private GitHub Pages site — REQUIRES a subdomain label (`x.pages.github.io`),
  # so the bare `pages.github.io` (GitHub's Pages home/docs) still gets link-checked. The `([:/]|$)`
  # boundary after `pages.github.io` keeps a spoof host like `evil-pages.github.io.attacker.com` out.
  "^https?://[^/@]+\\.pages\\.github\\.io([:/]|$)",
]
