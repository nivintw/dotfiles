# Repo-level typos config — used by the typos pre-commit hook and in CI.
# typos is treated as CHECK-ONLY (the hook drops --write-changes).

# Generated / vendored artifacts — not prose to spell-check. The asciinema-player
# bundle is minified third-party code (false positives like "alis"/"seeked"); the
# .cast files are recorded terminal output, not authored text; CHANGELOG.md is
# release-please-generated and quotes commit short-hashes, which are a typo lottery
# (a hash ending in a word-like fragment, e.g. `aef13ba`, blocked the v1.20.0
# Release PR's CI). rumdl excludes the changelog for the same generated-file reason.
[files]
extend-exclude = [
  "docs/assets/asciinema-player.*",
  "docs/casts/*.cast",
  "CHANGELOG.md",
]

[default]
# Ignore whole syntactic categories that are never typos but frequently get mangled.
extend-ignore-re = [
  # Scheme URLs (http, https, ftp, git, ssh, …) and bare www.* hosts.
  "(?:\\w+://|\\bwww\\.)\\S+",
  # Email addresses.
  "\\b[\\w.+-]+@[\\w.-]+\\.\\w+\\b",
  # Bare domains by common TLD.
  "\\b(?:[\\w-]+\\.)+(?:com|org|net|io|dev|gov|edu|co|app|ai|cloud|info|xyz)\\b",
  # Per-line escape hatch: trailing `# typos:disable-line` (also // -- ;).
  "(?m)^.*(?:#|//|--|;)[ \\t]*typos:disable-line[ \\t]*$",
]

# Whitelist file-extension / glob-fragment tokens from gitignore-style files by mapping
# them to themselves (typos sees them when a file is scanned explicitly by filename).
[default.extend-words]
acn = "acn" # *.acn  (LaTeX glossaries)
fot = "fot" # *.fot  (LaTeX)
ist = "ist" # *.ist  (LaTeX makeindex style)
lod = "lod" # *.lod  (LaTeX)
sav = "sav" # *.sav  (editor backup)
thm = "thm" # *.thm  (LaTeX amsthm)
