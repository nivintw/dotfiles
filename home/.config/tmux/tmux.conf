# tmux configuration — a lean starter. The headline feature is extrakto
# (prefix + Tab) to fuzzy-grab text from scrollback into the command line.
#
# Plugins are managed by TPM and installed by install.sh. To manage by hand:
#   prefix + I   install plugins listed below
#   prefix + U   update plugins
#
# Prefix is left as the default C-b on purpose (no surprise remap).

# ---------------------------------------------------------------------------
# Quality-of-life defaults
# ---------------------------------------------------------------------------
set -g mouse on                       # scroll, select panes/windows, resize by drag
set -g history-limit 50000            # generous scrollback
set -g base-index 1                   # windows start at 1 (0 is a reach)
setw -g pane-base-index 1             # panes start at 1 too
set -g renumber-windows on            # keep window numbers gap-free as you close them
set -sg escape-time 10                # don't swallow the Esc key (snappy vim/nvim)
set -g focus-events on                # let apps know when their pane gains focus
set -g set-clipboard on               # OSC52 clipboard integration

# True color for modern terminals (iTerm2).
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar: left as tmux's stock bar by design (you rarely use tmux and iTerm2
# already shows plenty). One legibility tweak only — show it at the bottom.
set -g status-position bottom

# ---------------------------------------------------------------------------
# Keybindings
# ---------------------------------------------------------------------------
# Intuitive, current-path-aware splits.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload this config.
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# ---------------------------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'laktak/extrakto'              # prefix + Tab: fuzzy-extract scrollback text
set -g @plugin 'tmux-plugins/tmux-yank'       # copy selections to the system clipboard
set -g @plugin 'christoomey/vim-tmux-navigator'  # Ctrl-h/j/k/l moves between panes (and vim splits)

# Initialize TPM — keep this line at the very bottom.
run '~/.config/tmux/plugins/tpm/tpm'
