# This repo isn't a Python package — pyproject.toml exists only to give the
# config-validation test suite (tests/test_*.py) a managed pytest environment.
# Run it with:  uv run pytest
# The fish-behavior tests are separate and run with bats (see tests/README.md).
[project]
name = "dotfiles"
version = "1.1.0"
requires-python = ">=3.14"
description = "Tyler Nivin's dotfiles and config repo"
authors = [{ name = "Tyler Nivin", email = "tyler@nivin.tech" }]
license = "MIT"
license-files = ["LICENSE", "LICENSES/*"]

classifiers = ["Programming Language :: Python :: 3"]

dependencies = []

[dependency-groups]
dev = [
  "json5>=0.14.0",
  "playwright>=1.60.0",
  "pytest>=9.1.0",
  "pytest-playwright>=0.8.0",
  "pyyaml>=6.0.3",
  "ruff>=0.15.17",
  "ty>=0.0.49",
]

[tool.uv]
package = false # don't try to build/install this repo as a package

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.format]
docstring-code-format = true # format code in docstrings

[tool.ruff.lint]
extend-select = [
  "ALL", # all the rules! (except complexity, which is noisy in configs)
]

ignore = ["D203", "D212", "D401", "COM812", "ISC001"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
# Tests legitimately use `assert` (S101) and shell out to git/fish via subprocess
# (S603/S607) with controlled, non-user input.
"tests/**" = [
  "S101",
  "S603",
  "S607",
  "INP001", # pytest test dir, not an importable package (flat `from conftest import`)
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.commitizen]
name = "cz_gitmoji"
version_provider = "uv"
update_changelog_on_bump = true
annotated_tag = true
# v-prefixed tags (v1.0.0) — the GitHub release convention. The CI release stage
# reads cz's computed version and tags v<version> to match; this also applies if
# you ever run `cz bump` locally.
tag_format = "v$version"
# Commit subject for a local `cz bump`. CI does NOT use this — it runs cz with
# --files-only and creates the signed commit via the API with its own "[skip ci]"
# headline (see main.yml), so this stays clean of [skip ci] to avoid skipping CI
# on a locally-made bump.
bump_message = "🔖 bump: $current_version → $new_version"
