version = 1

# The files that can't (or shouldn't) carry an SPDX header: no comment syntax (strict
# JSON, the iTerm plist, the bare .python-version string), generated (uv.lock — uv
# rewrites it), where a leading '#' is parsed as data (fisher reads every fish_plugins
# line as a plugin), or where a header breaks a parser (Claude Code reads .claude/
# frontmatter). Everything else gets a real header from hawkeye (see licenserc.toml);
# this annotates the remainder so the repo stays REUSE-compliant. Keep in sync with the
# excludes in licenserc.toml.
[[annotations]]
path = [
  "**/*.json",
  "**/.python-version",             # Python version file. Annotate to satisfy REUSE.
  "**/.vscode/*",                   # VSCode settings, extensions, and launch configs. Annotate to satisfy REUSE.
  "**/.claude/**",                  # SPDX headers break Claude Code's frontmatter parsers
  "docs/.nojekyll",                 # Empty marker for GitHub Pages; content is ignored.
  "home/.config/fish/fish_plugins", # Every non-blank line is a plugin spec; '#' isn't a comment.
  "iterm2/**",
  "uv.lock",                        # Generated by uv, so no header. Annotate to satisfy REUSE.
]
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"
